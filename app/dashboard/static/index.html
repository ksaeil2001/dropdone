<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DropDone</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⬇</div>
      <div>
        <div class="logo-text">DropDone</div>
        <div class="logo-ver">v1.0.0 MVP</div>
      </div>
    </div>

    <div class="sidebar-status">
      <div class="status-dot"></div>
      <div class="status-text">감시 중</div>
    </div>

    <nav class="nav">
      <div class="nav-item active" data-tab="active">
        <span class="nav-icon">⏳</span>
        <span>진행 중</span>
        <span class="nav-badge" id="badge-active">0</span>
      </div>
      <div class="nav-item" data-tab="history">
        <span class="nav-icon">📋</span>
        <span>완료 기록</span>
      </div>
      <div class="nav-item" data-tab="rules">
        <span class="nav-icon">⚙</span>
        <span>자동 정리 규칙</span>
      </div>
      <div class="nav-item" data-tab="settings">
        <span class="nav-icon">🔧</span>
        <span>설정</span>
      </div>
    </nav>

    <div class="sidebar-bottom">
      <div class="shutdown-widget" id="shutdown-widget">
        <div class="sw-label">⏻ 자동 종료</div>
        <div class="sw-status" id="sw-status">모든 다운로드 완료 시 종료</div>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="page-title">진행 중</div>
      <div class="topbar-actions">
        <button class="btn" onclick="location.reload()">↺ 새로고침</button>
      </div>
    </div>

    <div class="content" id="content">
      <div class="empty-state">불러오는 중...</div>
    </div>
  </div>

</div>

<!-- ── 규칙 추가/편집 모달 ── -->
<div class="rule-modal-overlay" id="ruleModal">
  <div class="rule-modal">
    <div class="rule-modal-header">
      <div class="rule-modal-title">규칙 추가</div>
      <button class="rule-modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="rule-modal-body">
      <div>
        <div class="rule-field-label">카테고리</div>
        <div class="cat-card-grid" id="catGrid"></div>
      </div>
      <div>
        <div class="rule-field-label">대상 폴더</div>
        <div class="folder-picker-row">
          <div class="folder-display" id="folderDisplay">폴더를 입력하세요</div>
          <input id="folderInput" type="text" placeholder="예: D:\Videos" style="flex:1;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;">
        </div>
      </div>
    </div>
    <div class="rule-modal-footer">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn primary" onclick="saveRule()">저장</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
