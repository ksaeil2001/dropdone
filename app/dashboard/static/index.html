<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DropDone</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⬇</div>
      <div>
        <div class="logo-text">DropDone</div>
        <div class="logo-ver">v1.0.0 MVP</div>
      </div>
    </div>

    <div class="sidebar-status">
      <div class="status-dot"></div>
      <div class="status-text">감시 중</div>
    </div>

    <nav class="nav">
      <div class="nav-item active" data-tab="active">
        <span class="nav-icon">⏳</span>
        <span>진행 중</span>
        <span class="nav-badge" id="badge-active">0</span>
      </div>
      <div class="nav-item" data-tab="history">
        <span class="nav-icon">📋</span>
        <span>완료 기록</span>
      </div>
      <div class="nav-item" data-tab="rules">
        <span class="nav-icon">⚙</span>
        <span>자동 정리 규칙</span>
      </div>
      <div class="nav-item" data-tab="settings">
        <span class="nav-icon">🔧</span>
        <span>설정</span>
      </div>
    </nav>

    <div class="sidebar-bottom">
      <div class="shutdown-widget" id="shutdown-widget">
        <div class="sw-label">⏻ 자동 종료</div>
        <div class="sw-status" id="sw-status">모든 다운로드 완료 시 종료</div>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">
    <!-- 에러 배너 -->
    <div id="errorBanner" style="display:none;background:#fef3c7;border-bottom:1px solid #fbbf24;padding:10px 20px;display:none;align-items:center;gap:10px;font-size:13px;color:#92400e;">
      <span id="errorBannerText">⚠️ 파일 이동 실패 0건</span>
      <button onclick="showErrorModal()" style="background:#f59e0b;color:#fff;border:none;border-radius:4px;padding:3px 10px;cursor:pointer;font-size:12px;">자세히 보기</button>
      <button onclick="clearErrorsAndHide()" style="background:none;border:1px solid #f59e0b;color:#92400e;border-radius:4px;padding:3px 10px;cursor:pointer;font-size:12px;margin-left:auto;">모두 지우기</button>
    </div>

    <div class="topbar">
      <div class="page-title" id="page-title">진행 중</div>
      <div class="topbar-actions">
        <button class="btn" onclick="location.reload()">↺ 새로고침</button>
      </div>
    </div>

    <div class="content" id="content">
      <div class="empty-state">불러오는 중...</div>
    </div>
  </div>

</div>

<!-- ── 규칙 추가/편집 모달 ── -->
<div class="rule-modal-overlay" id="ruleModal">
  <div class="rule-modal">
    <div class="rule-modal-header">
      <div class="rule-modal-title">규칙 추가</div>
      <button class="rule-modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="rule-modal-body">
      <div>
        <div class="rule-field-label">카테고리</div>
        <div class="cat-card-grid" id="catGrid"></div>
      </div>
      <div>
        <div class="rule-field-label">대상 폴더</div>
        <div class="folder-picker-row">
          <div class="folder-display" id="folderDisplay">폴더를 입력하세요</div>
          <input id="folderInput" type="text" placeholder="예: D:\Videos" style="flex:1;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;">
        </div>
      </div>
    </div>
    <div class="rule-modal-footer">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn primary" onclick="saveRule()">저장</button>
    </div>
  </div>
</div>

<!-- 에러 모달 -->
<div id="errorModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:var(--surface,#1e2130);border-radius:12px;width:600px;max-width:90vw;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;">
    <div style="padding:20px 24px;border-bottom:1px solid var(--border,#2d3148);display:flex;justify-content:space-between;align-items:center;">
      <span style="font-weight:600;font-size:15px;">⚠️ 파일 이동 실패 목록</span>
      <button onclick="document.getElementById('errorModal').style.display='none'" style="background:none;border:none;color:var(--text3,#94a3b8);font-size:18px;cursor:pointer;">✕</button>
    </div>
    <div id="errorList" style="overflow-y:auto;padding:16px 24px;flex:1;"></div>
    <div style="padding:16px 24px;border-top:1px solid var(--border,#2d3148);text-align:right;">
      <button onclick="clearErrorsAndHide()" style="background:#ef4444;color:#fff;border:none;border-radius:6px;padding:6px 16px;cursor:pointer;font-size:13px;">모두 지우기</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
